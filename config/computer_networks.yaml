subject: 计算机网络
description: 计算机网络期末考试复习指南（依据教学大纲）
chapters:
- title: 第一章 计算机网络概述
  points:
  - title: 三种交换方式：电路交换、报文交换、分组交换
    keywords:
      primary:
        电路交换: 2.0
        报文交换: 2.0
        分组交换: 2.0
        数据报: 2.0
        虚电路: 2.0
      secondary:
        交换方式: 1.0
        存储转发: 1.0
        面向连接: 1.0
        建立连接: 1.0
        释放连接: 1.0
      negative:
        HDLC: 1.0
        PPP: 1.0
        CSMA: 1.0
        子网: 1.0
        路由表: 1.0
        TCP: 1.0
        UDP: 1.0
        拥塞: 1.0
    guidance: 三种交换方式是计网开篇的核心概念。建议从“是否需要建立连接、数据是否拆分、时延特征、带宽利用率”四个维度对比记忆。电路交换面向连接、独占资源、实时性好但利用率低；报文交换无需建立连接、采用存储转发但报文过大时节点缓存压力大；分组交换将报文切分为分组，综合了灵活性与高效性，是现代互联网的主流交换方式。
    examples:
    - 打电话就是“电路交换”——拨通后这条线路被你独占，通话质量稳定，但别人打不进来。
    - 去邮局寄一封完整的手写信就是“报文交换”——邮局整封信存储、转发。
    - 拆成多个包裹发快递就是“分组交换”——每个包裹可以走不同路线，最后按收件人拼装。
  - title: 性能指标：发送时延、传播时延、时延带宽积等
    keywords:
      primary:
        发送时延: 2.0
        传播时延: 2.0
        传输时延: 2.0
        时延带宽积: 2.0
        时延: 2.0
      secondary:
        处理时延: 1.0
        排队时延: 1.0
        往返时间: 1.0
        RTT: 1.0
        利用率: 1.0
        吞吐量: 1.0
        带宽: 1.0
        信道长度: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        IP地址: 1.0
        子网: 1.0
        CSMA: 1.0
    guidance: 性能指标计算题几乎是每年必考。牢记公式：发送时延 = 数据帧长度(bit) / 发送速率(bit/s)；传播时延 = 信道长度(m) / 电磁波传播速率(m/s)。总时延是四者之和。时延带宽积表示“管道中的比特数”。做计算题时务必写明公式与单位，不能只写结果。
    examples:
    - 你开车上高速，在收费站排队缴费的时间就是“发送时延”。
    - 车在高速上跑的时间就是“传播时延”。
    - 整条高速上同时存在的车辆数就是“时延带宽积”。
  - title: 计算机网络分层：OSI 七层、TCP/IP 四层、教学五层
    keywords:
      primary:
        OSI: 2.0
        TCP/IP: 2.0
        五层: 2.0
        七层: 2.0
        四层: 2.0
        协议数据单元: 2.0
        PDU: 2.0
      secondary:
        物理层: 1.0
        数据链路层: 1.0
        网络层: 1.0
        传输层: 1.0
        应用层: 1.0
        会话层: 1.0
        表示层: 1.0
        网络接口层: 1.0
        对等层: 1.0
        服务: 1.0
        接口: 1.0
        工作于: 1.0
        位于: 1.0
        哪一层: 1.0
      negative:
        电路交换: 1.0
        报文交换: 1.0
        分组交换: 1.0
        子网: 1.0
        RIP: 1.0
        OSPF: 1.0
        CSMA: 1.0
    guidance: 分层思想是理解网络协议的钥匙。教学五层与 OSI 七层、TCP/IP 四层要对照记忆：物理层→数据链路层→网络层→传输层→应用层。OSI 七层多了会话层、表示层；TCP/IP 将数据链路层和物理层合并为网络接口层。要清楚每一层的协议数据单元（PDU）及核心功能。
    examples:
    - 像一家公司，老板（应用层）只跟秘书（传输层）说话，秘书跟部门经理（网络层）说话，
    - 部门经理跟车间主任（数据链路层）说话，车间主任跟快递员（物理层）说话；
    - 每一层不用关心其他层具体怎么干活，只接收上层任务并把结果交给下层。
- title: 第二章 物理层
  points:
  - title: 物理层基础：码元、调制解调、信道、传输介质
    keywords:
      primary:
        码元: 2.0
        调制: 2.0
        解调: 2.0
        采样: 2.0
        量化: 2.0
        编码: 2.0
        传输介质: 2.0
        双绞线: 2.0
        同轴电缆: 2.0
        光纤: 2.0
        无线: 2.0
      secondary:
        信道: 1.0
        基带: 1.0
        频带: 1.0
        信噪比: 1.0
        EIA: 1.0
        RS-232: 1.0
        单模光纤: 1.0
        多模光纤: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        IP地址: 1.0
        子网: 1.0
        路由: 1.0
        CSMA: 1.0
        帧: 1.0
    guidance: 物理层关心“如何在传输媒体上传输比特流”。重点掌握码元速率与数据传输速率的区别、调制解调的基本过程、常见传输介质的特性。单模光纤传输距离远、带宽大；多模光纤成本低、适合短距离。
    examples:
    - 交通信号灯的红、黄、绿三种状态就是“码元”。
    - 把电脑里的 MP3 数字音乐转换成无线电波放给蓝牙耳机听，就是“调制”。
    - 蓝牙耳机再把它变回声音就是“解调”；光纤、双绞线、Wi-Fi 就像不同材质的道路。
  - title: 信道容量：香农公式与奈氏准则
    keywords:
      primary:
        香农: 2.5
        奈氏: 2.5
        奈奎斯特: 2.5
        Shannon: 2.5
        Nyquist: 2.5
        信道容量: 2.5
      secondary:
        无噪声: 1.0
        信噪比: 1.0
        带宽: 1.0
        极限速率: 1.0
        码元: 1.0
        进制: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        IP地址: 1.0
        子网: 1.0
        路由: 1.0
        CSMA: 1.0
    guidance: 香农公式 C = W log₂(1+S/N) 与奈氏准则 C = 2W log₂M 是计算题重点。香农公式适用于有噪声信道；奈氏准则适用于理想低通信道。注意信噪比常以 dB 给出，需先用 dB = 10 log₁₀(S/N)
      换算。
    examples:
    - 一根水管的流量上限取决于两个因素：水管有多粗（带宽）、水里有多少杂质（噪声）。
    - 奈氏准则说“理想纯净水”下的最大流量；香农公式则告诉你“有杂质时”还能最大传多少。
  - title: 信道复用技术：时分复用、码分复用、频分复用等
    keywords:
      primary:
        时分复用: 2.0
        码分复用: 2.0
        频分复用: 2.0
        波分复用: 2.0
        CDMA: 2.0
        TDM: 2.0
        FDM: 2.0
      secondary:
        同步时分: 1.0
        异步时分: 1.0
        统计时分: 1.0
        复用: 1.0
        码片: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        IP地址: 1.0
        子网: 1.0
        路由: 1.0
        CSMA: 1.0
        帧: 1.0
    guidance: 复用技术提高信道利用率。频分复用按频率划分、时分复用按时间划分、码分复用按编码序列划分（CDMA 常用）。注意同步 TDM 与统计 TDM 的区别，以及 CDMA 中码片序列正交性的概念。
    examples:
    - 不同电台用不同频率广播就是“频分复用”。
    - 一条单车道大家轮流过就是“时分复用”。
    - 一群人在嘈杂餐厅里用各自的语言聊天，只听得懂同伴的话就是“码分复用（CDMA）”。
- title: 第三章 数据链路层
  points:
  - title: 数据链路层功能：帧、透明传输、差错控制
    keywords:
      primary:
        帧: 2.5
        透明传输: 2.5
        差错控制: 2.5
        CRC: 2.5
        循环冗余检验: 2.5
        FCS: 2.5
        PPP: 2.5
        HDLC: 2.5
      secondary:
        数据链路层: 1.0
        帧定界: 1.0
        零比特填充: 1.0
        字符填充: 1.0
        校验: 1.0
        帧中继: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        IP地址: 1.0
        子网: 1.0
        路由: 1.0
        RIP: 1.0
        OSPF: 1.0
        三次握手: 1.0
        防火墙: 1.0
        防病毒: 1.0
        NAT: 1.0
        DNS: 1.0
    guidance: 数据链路层负责相邻节点间的可靠传输。核心是“封装成帧、透明传输、差错检测”。CRC 计算要掌握生成多项式、模 2 除法；PPP 与 HDLC 是两种典型协议，注意它们的帧格式与透明传输方法。
    examples:
    - 把信纸装进信封并写上收发地址就是“封装成帧”。
    - 信里内容无论写什么都不能让邮局误认为是信封命令就是“透明传输”。
    - 快递单号的校验码就是“差错控制（CRC）”，防止分拣出错。
  - title: 局域网与 MAC 地址、交换机与 VLAN
    keywords:
      primary:
        MAC: 2.0
        MAC地址: 2.0
        局域网: 2.0
        以太网: 2.0
        VLAN: 2.0
        虚拟局域网: 2.0
        交换机: 2.0
        网桥: 2.0
        透明网桥: 2.0
        冲突域: 2.0
        广播域: 2.0
      secondary:
        LLC: 1.0
        自学习: 1.0
        广播: 1.0
        工作组: 1.0
        Hub: 1.0
        集线器: 1.0
      negative:
        IP地址: 1.0
        子网: 1.0
        RIP: 1.0
        OSPF: 1.0
        TCP: 1.0
        UDP: 1.0
        拥塞: 1.0
    guidance: MAC 地址是数据链路层的硬件地址，48 位，全球唯一。网桥/交换机基于 MAC 地址转发，能隔离冲突域但不能隔离广播域。VLAN 可以隔离广播域。注意冲突域与广播域在不同设备下的数量计算。
    examples:
    - MAC 地址就像每个人的身份证号，全球唯一。
    - 交换机就像小区门卫，按门牌号（MAC）把快递送到具体住户。
    - VLAN 就像把一个大小区用围墙分成几个小院子，院子里的广播不会传到别的院子。
  - title: CSMA/CD 协议与以太网
    keywords:
      primary:
        CSMA/CD: 2.5
        载波监听: 2.5
        碰撞检测: 2.5
        争用期: 2.5
        截断二进制指数退避: 2.5
        最小帧长: 2.5
        10BASE-T: 2.5
        100BASE-T: 2.5
      secondary:
        CSMA: 1.0
        以太网: 1.0
        冲突: 1.0
        重发: 1.0
        集线器: 1.0
        Hub: 1.0
      negative:
        IP地址: 1.0
        子网: 1.0
        RIP: 1.0
        OSPF: 1.0
        TCP: 1.0
        UDP: 1.0
        路由: 1.0
    guidance: CSMA/CD 是传统以太网的核心协议。记住“先听后发、边听边发、冲突停发、随机重发”十六字口诀。争用期 51.2 μs（10 Mbit/s 以太网）、最小帧长 64 字节、截断二进制指数退避算法都是常考点。
    examples:
    - 一群人围坐开会，想发言前先听听有没有人说话（载波监听）。
    - 如果两个人同时开口，就互相礼让，等随机时间后再说（冲突检测+退避）。
    - 传统以太网就像“谁先抢到话筒谁讲”。
- title: 第四章 网络层
  points:
  - title: IP 地址基础：结构、分类、点分十进制、CIDR
    keywords:
      primary:
        IP地址: 2.0
        IPv4: 2.0
        A类: 2.0
        B类: 2.0
        C类: 2.0
        点分十进制: 2.0
        网络号: 2.0
        主机号: 2.0
        CIDR: 2.0
        网络前缀: 2.0
      secondary:
        特殊地址: 1.0
        私有地址: 1.0
        回环地址: 1.0
        分类: 1.0
        地址结构: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        路由表: 1.0
        RIP: 1.0
        OSPF: 1.0
        CSMA: 1.0
        帧: 1.0
    guidance: IP 地址是网络层最重要的概念。A 类首字节 1~126，B 类 128~191，C 类 192~223。主机号全 0 表示网络地址，全 1 表示广播地址。CIDR 用“网络前缀/前缀长度”表示，是理解子网划分与路由聚合的基础。
    examples:
    - IP 地址就像“省-市-区-门牌号”的地址。
    - A/B/C 类相当于大、中、小城市。
    - CIDR 的“/24”就像说“前 24 位是省市区，剩下的才是门牌号”。
  - title: 子网划分、子网掩码与地址聚合
    keywords:
      primary:
        子网划分: 2.5
        子网掩码: 2.5
        网络地址: 2.5
        广播地址: 2.5
        可用主机数: 2.5
        地址聚合: 2.5
        路由聚合: 2.5
        超网: 2.5
        CIDR: 2.5
        前缀: 2.5
        网段: 2.5
      secondary:
        子网: 1.0
        掩码: 1.0
        子网位: 1.0
        主机位: 1.0
        聚合: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        CSMA: 1.0
        HDLC: 1.0
        PPP: 1.0
        路由表更新: 1.0
    guidance: 子网划分“借主机位作子网位”，子网掩码中 1 的位数即网络前缀长度。聚合地址时找共同前缀，前缀越短包含地址越多。计算题要熟练使用二进制与十进制转换，推荐先转二进制再划分子网。
    examples:
    - 子网划分就像一栋大楼按楼层、房间号细分。
    - 子网掩码就是“哪部分是楼号、哪部分是房间号”的分界线。
    - 地址聚合就像把相邻的几个小区合并成一个片区，方便快递统一派送。
  - title: 路由与转发：RIP、OSPF、路由表、下一跳
    keywords:
      primary:
        RIP: 2.5
        OSPF: 2.5
        路由表: 2.5
        下一跳: 2.5
        距离向量: 2.5
        链路状态: 2.5
        跳数: 2.5
      secondary:
        路由: 1.0
        自治系统: 1.0
        内部网关协议: 1.0
        外部网关协议: 1.0
        BGP: 1.0
        收敛: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        CSMA: 1.0
        HDLC: 1.0
        PPP: 1.0
        子网划分: 1.0
    guidance: RIP 基于距离向量，最大跳数 15，每 30 秒交换整张路由表，简单但收敛慢；OSPF 基于链路状态，使用 Dijkstra 算法，收敛快、适合大规模网络。路由表更新题要会计算“下一跳”与“距离”。
    examples:
    - RIP 就像问路时只数“还有几个路口”，最多数到 15 个路口就认为太远。
    - OSPF 就像打开手机地图看全路网，选最短路。
    - 路由表就是你手里的导航提示，告诉你“下一站往哪走”。
  - title: 基于 IP 地址的分组转发与网络设备
    keywords:
      primary:
        IP数据报: 2.0
        分组转发: 2.0
        目的地址: 2.0
        路由器: 2.0
        ARP: 2.0
        NAT: 2.0
        网络地址转换: 2.0
        数据报分片: 2.0
        MTU: 2.0
      secondary:
        源地址: 1.0
        数据报: 1.0
        分片: 1.0
        标识: 1.0
        片偏移: 1.0
        网关: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        CSMA: 1.0
        HDLC: 1.0
        PPP: 1.0
        子网划分: 1.0
        RIP: 1.0
        OSPF: 1.0
    guidance: 路由器根据目的 IP 地址查表转发；ARP 实现 IP→MAC 地址解析；NAT 实现私有地址与公网地址转换。IP 数据报分片要掌握标识、标志、片偏移字段。
    examples:
    - 路由器就像快递分拣中心，看收件地址（目的 IP）决定发往哪个城市。
    - ARP 就像查通讯录，把联系人姓名（IP）翻译成手机号（MAC）。
    - NAT 就像公司前台，把内部小号转成对外的总机号。
- title: 第五章 运输层
  points:
  - title: TCP 与 UDP：协议特点、报文格式、端口与套接字
    keywords:
      primary:
        TCP协议: 2.0
        UDP协议: 2.0
        端口: 2.0
        套接字: 2.0
        socket: 2.0
      secondary:
        传输层: 1.0
        面向连接: 1.0
        无连接: 1.0
        可靠传输: 1.0
        报文段: 1.0
        首部: 1.0
        校验和: 1.0
        端口号: 1.0
      negative:
        拥塞: 1.0
        慢开始: 1.0
        拥塞避免: 1.0
        快重传: 1.0
        快恢复: 1.0
        三次握手: 1.0
        四次挥手: 1.0
        滑动窗口: 1.0
        CSMA: 1.0
        子网: 1.0
    guidance: 'TCP 面向连接、可靠、面向字节流；UDP 无连接、尽最大努力交付、开销小。熟知端口 0~1023（如 HTTP 80、FTP 21、SMTP 25、DNS 53）。套接字 = IP 地址 : 端口号，唯一标识通信端点。'
    examples:
    - TCP 像打电话——先拨号建立连接，说一句对方确认一句，可靠但慢一点。
    - UDP 像发微信语音或看直播——直接发，快，但可能丢几句。
    - 端口号就像公寓房间号，套接字 = 小区地址 + 房间号。
  - title: TCP 可靠传输：滑动窗口、确认、三次握手、四次挥手
    keywords:
      primary:
        滑动窗口: 2.5
        确认号: 2.5
        确认报文: 2.5
        ACK: 2.5
        三次握手: 2.5
        四次挥手: 2.5
        连接建立: 2.5
        连接释放: 2.5
        SYN: 2.5
        FIN: 2.5
      secondary:
        序号: 1.0
        seq: 1.0
        ack: 1.0
        流量控制: 1.0
        可靠传输: 1.0
      negative:
        拥塞: 1.0
        慢开始: 1.0
        拥塞避免: 1.0
        快重传: 1.0
        快恢复: 1.0
        CSMA: 1.0
        子网: 1.0
        HDLC: 1.0
        PPP: 1.0
        零比特填充: 1.0
        防火墙: 1.0
        认证: 1.0
        身份: 1.0
    guidance: TCP 三次握手解决同步初始序号、防止历史连接；四次挥手保证双方数据都能完整传输。滑动窗口实现流水线传输与流量控制。要能画出三次握手/四次挥手的报文交换示意图。
    examples:
    - 三次握手像两人对对讲机：“你能听到我吗？”“我能听到，你能听到我吗？”“我也能听到！”。
    - 四次挥手像挂电话前互相确认“我说完了”“我也说完了”“那我挂了”“好的再见”。
  - title: TCP 拥塞控制：慢开始、拥塞避免、快重传、快恢复
    keywords:
      primary:
        拥塞控制: 2.5
        慢开始: 2.5
        拥塞避免: 2.5
        快重传: 2.5
        快恢复: 2.5
        拥塞窗口: 2.5
        cwnd: 2.5
        ssthresh: 2.5
      secondary:
        RTT: 1.0
        传输轮次: 1.0
        超时: 1.0
        慢开始门限: 1.0
      negative:
        三次握手: 1.0
        四次挥手: 1.0
        滑动窗口: 1.0
        CSMA: 1.0
        子网: 1.0
    guidance: 拥塞控制四大算法常考曲线图与数值计算。慢开始阶段 cwnd 指数增长，到 ssthresh 后转线性增长（拥塞避免）；超时则 ssthresh 减半、cwnd 归 1；收到 3 个重复 ACK 则 ssthresh
      减半、cwnd = ssthresh 并进入拥塞避免（快恢复）。建议画 cwnd 随轮次变化图辅助记忆。
    examples:
    - 上高速遇到堵车：“慢开始”是刚起步时慢慢踩油门。
    - “拥塞避免”是车速稳定后匀速开。
    - 一旦堵死（超时）就回到起点重新慢起步。
    - 如果只是前面车突然刹车但马上又动了（3 个重复 ACK），就减速但不用回到起点。
- title: 第六章 应用层（补充）
  points:
  - title: DNS：域名系统与域名解析过程
    keywords:
      primary:
        DNS: 2.5
        域名系统: 2.5
        域名解析: 2.5
        域名: 2.5
        www: 2.5
      secondary:
        主机名: 1.0
        顶级域名: 1.0
        EDU: 1.0
        COM: 1.0
        CN: 1.0
        递归查询: 1.0
        迭代查询: 1.0
      negative:
        TCP: 1.0
        UDP: 1.0
        IP地址: 1.0
        子网: 1.0
        路由: 1.0
        CSMA: 1.0
        帧: 1.0
    guidance: DNS 负责域名到 IP 地址的解析。掌握域名层次结构、递归查询与迭代查询的区别、本地 DNS 服务器的作用。
    examples:
    - DNS 就像电话号码簿。你记得朋友的名字（www.example.com），但打电话需要号码（IP 地址）。
    - DNS 负责把名字查成号码；本地 DNS 就像你手机里存的常用联系人缓存。
  - title: HTTP、FTP、SMTP、POP 等常见应用层协议
    keywords:
      primary:
        HTTP: 2.0
        FTP: 2.0
        SMTP: 2.0
        POP: 2.0
        TELNET: 2.0
        WWW: 2.0
        Web: 2.0
      secondary:
        超文本: 1.0
        文件传输: 1.0
        电子邮件: 1.0
        请求报文: 1.0
        响应报文: 1.0
        统一资源定位器: 1.0
        URL: 1.0
        HTML: 1.0
      negative:
        IP地址: 1.0
        子网: 1.0
        路由表: 1.0
        CSMA: 1.0
        帧: 1.0
    guidance: 应用层直接为用户应用提供服务。HTTP 使用 TCP 80 端口；FTP 使用 21（控制）和 20（数据）；SMTP 用于发送邮件，POP3/IMAP 用于接收邮件。注意 HTTP 请求报文与响应报文的基本格式。
    examples:
    - HTTP 像浏览网页。
    - FTP 像网盘传文件。
    - SMTP 像把信投进邮筒（发邮件）。
    - POP3/IMAP 像打开自家信箱收信。
